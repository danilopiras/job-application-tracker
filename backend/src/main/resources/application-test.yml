server:
  port: ${SERVER_PORT:9000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

jwt:
  secret: ${JWT_SECRET:local-dev-jwt-hmac-sha256-needs-at-least-32-chars}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:1209600000}

app:
  reset-password:
    base-url: ${RESET_PASSWORD_BASE_URL:http://localhost:4200/reset-password}
  mail:
    from: ${MAIL_FROM:}

spring:
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/jobtracker}
    username: ${SPRING_DATASOURCE_USERNAME:jobtracker}
    password: ${SPRING_DATASOURCE_PASSWORD:jobtracker}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
