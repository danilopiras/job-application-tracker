<div class="page">
  <div class="hero">
    <h1>{{ 'auth.register.title' | transloco }}</h1>
    <p class="muted">{{ 'app.tagline' | transloco }}</p>
  </div>

  <mat-card class="card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>{{ 'auth.email' | transloco }}</mat-label>
          <input matInput formControlName="email" type="email" autocomplete="email" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'auth.password' | transloco }}</mat-label>
          <input matInput formControlName="password" type="password" autocomplete="new-password" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'auth.confirmPassword' | transloco }}</mat-label>
          <input matInput formControlName="confirmPassword" type="password" autocomplete="new-password" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading">
          {{ loading ? ('common.loading' | transloco) : ('auth.register.cta' | transloco) }}
        </button>

        <p class="footer">
          <span class="footer__muted">{{ 'auth.register.haveAccount' | transloco }}</span>
          <a routerLink="/auth/login">{{ 'auth.register.signIn' | transloco }}</a>
        </p>
      </form>
    </mat-card-content>
  </mat-card>
</div>
