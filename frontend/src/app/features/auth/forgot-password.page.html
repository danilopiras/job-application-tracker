<div class="page">
  <div class="hero">
    <h1>{{ 'auth.forgot.title' | transloco }}</h1>
    <p class="muted">{{ 'app.tagline' | transloco }}</p>
  </div>

  <mat-card class="card">
    <mat-card-content>
      <p class="help">{{ 'auth.forgot.help' | transloco }}</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>{{ 'auth.email' | transloco }}</mat-label>
          <input matInput formControlName="email" type="email" autocomplete="email" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading">
          {{ loading ? ('common.loading' | transloco) : ('auth.forgot.cta' | transloco) }}
        </button>

        <a class="back" routerLink="/auth/login">{{ 'auth.backToLogin' | transloco }}</a>
      </form>
    </mat-card-content>
  </mat-card>
</div>
