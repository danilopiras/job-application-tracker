<div class="page">
  <div class="hero">
    <h1>{{ 'auth.reset.title' | transloco }}</h1>
    <p class="muted">{{ 'app.tagline' | transloco }}</p>
  </div>

  <mat-card class="card">
    <mat-card-content>
      <p class="help">{{ 'auth.reset.help' | transloco }}</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>{{ 'auth.newPassword' | transloco }}</mat-label>
          <input matInput formControlName="newPassword" type="password" autocomplete="new-password" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'auth.confirmPassword' | transloco }}</mat-label>
          <input matInput formControlName="confirmPassword" type="password" autocomplete="new-password" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading">
          {{ loading ? ('common.loading' | transloco) : ('auth.reset.cta' | transloco) }}
        </button>

        <a class="back" routerLink="/auth/login">{{ 'auth.backToLogin' | transloco }}</a>
      </form>
    </mat-card-content>
  </mat-card>
</div>
