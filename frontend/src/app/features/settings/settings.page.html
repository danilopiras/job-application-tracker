<div class="hero">
  <h1>{{ 'settings.title' | transloco }}</h1>
  <p class="muted">{{ 'settings.subtitle' | transloco }}</p>
</div>

<mat-card>
  <mat-card-content>
    <mat-form-field appearance="outline" class="lang-field">
      <mat-label>{{ 'settings.language' | transloco }}</mat-label>
      <mat-select [value]="activeLang()" (selectionChange)="setLang($event.value)">
        @for (lang of langs; track lang) {
          <mat-option [value]="lang">{{ ('lang.' + lang) | transloco }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-card-content>
</mat-card>
