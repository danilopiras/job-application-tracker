version: "3.9"

services:
  db:
    image: postgres:16
    container_name: jobtracker-postgres
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: jobtracker
    ports:
      - "5432:5432"
    volumes:
      - jobtracker_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobtracker-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/jobtracker
      SPRING_DATASOURCE_USERNAME: jobtracker
      SPRING_DATASOURCE_PASSWORD: jobtracker
    ports:
      - "8080:8080"
    depends_on:
      - db

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: jobtracker-frontend
  #   ports:
  #     - "4200:80"
  #   depends_on:
  #     - backend
  #   # In futuro puoi servire l'app Angular come static assets via Nginx

volumes:
  jobtracker_pgdata:

